<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo Oscuro Premium -->
  <rect width="100" height="100" fill="#050505" />
  
  <!-- Icono Principal: Vexo (V estilizada tecnológica) -->
  <path d="M 20 20 L 35 35 L 50 20 L 65 35 L 80 20 L 80 80 L 20 80 Z" 
        fill="url(#neonGradient)" 
        filter="url(#glow)" 
        opacity="0.9" />
        
  <!-- Detalle interior: Circuito neuronal -->
  <path d="M 35 35 L 45 45 L 55 35 L 65 45" 
        stroke="#ffffff" 
        stroke-width="2" 
        fill="none" 
        opacity="0.6" />
        
  <!-- Texto Subtente (Opcional para favicon, omitido para legibilidad en iOS) -->
</svg>